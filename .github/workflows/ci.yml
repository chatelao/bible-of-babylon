name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        chmod +x src/install.sh
        chmod +x test/install.sh
        ./src/install.sh
        ./test/install.sh

    - name: Run tests
      run: |
        python -m pytest
