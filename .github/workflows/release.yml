name: Release Assets

on:
  release:
    types: [published]

jobs:
  generate-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          chmod +x src/install.sh
          ./src/install.sh

      - name: Generate Matrices
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python3 -m src.main patterns/programming.patterns -m "C,Java,Rust,Python,PHP,Bash,PowerShell,Cmd,SQL,Erlang,Lisp,XQuery,CSS,CUDA,X86,Riscv,Prolog" --csv -o programming_matrix.csv
          python3 -m src.main patterns/data_formats.patterns -m "JSON,XML,YAML,TOML,CSV,Fixlength" --csv -o data_formats_matrix.csv

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            programming_matrix.csv
            data_formats_matrix.csv
